name: Update AI Incident Watch
on:
  schedule:
    - cron: '17 1 * * *'  # 01:17 UTC daily
  workflow_dispatch: {}
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Refresh data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/fetch-incidents.py
      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet ai-incident-watch/data.json; then
            echo 'No changes'
          else
            git add ai-incident-watch/data.json
            git commit -m "ai-incident-watch: refresh data.json ($(date -u +%Y-%m-%d))"
            git push
          fi
