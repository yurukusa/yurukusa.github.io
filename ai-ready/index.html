<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Are You Ready for an AI Agent? — 10-Question Readiness Check</title>
  <meta name="description" content="10 questions based on real experience running an autonomous AI for 50 days. Find out if you're ready to hand the keyboard to an AI agent.">
  <meta property="og:title" content="Are You Ready for an AI Agent?">
  <meta property="og:description" content="10 questions from someone who actually did it. 50 days of data. Find your AI readiness type.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c14;
      --surface: #141420;
      --surface2: #1c1c30;
      --border: #28283e;
      --text: #e4e4f0;
      --text-dim: #6e6e8e;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.12);
      --green: #10b981;
      --gold: #f59e0b;
      --blue: #3b82f6;
      --red: #ef4444;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 640px; margin: 0 auto; padding: 0 20px; }

    /* Hero */
    header {
      text-align: center;
      padding: 60px 20px 48px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 20%, var(--accent-glow) 0%, transparent 70%);
    }
    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      position: relative;
    }
    header h1 span { color: var(--accent); }
    header p {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-top: 10px;
      position: relative;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 99px;
      padding: 3px 12px;
      margin-bottom: 14px;
      position: relative;
    }

    /* Progress */
    .progress-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-text {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 6px;
      text-align: center;
    }

    /* Question card */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      margin: 24px 0;
      display: none;
    }
    .question-card.active { display: block; }
    .q-number {
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .q-scenario {
      font-size: 0.82rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
    }
    .q-text {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 8px; }
    .option {
      padding: 14px 18px;
      background: var(--surface2);
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text);
      transition: all 0.15s;
      text-align: left;
      font-family: inherit;
      width: 100%;
    }
    .option:hover { border-color: var(--accent); background: rgba(139,92,246,0.08); }
    .option.selected { border-color: var(--accent); background: rgba(139,92,246,0.12); }

    /* Results */
    #results {
      display: none;
      text-align: center;
      padding: 40px 0 60px;
    }
    #results.visible { display: block; }

    .result-type {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 900;
      margin-bottom: 4px;
    }
    .result-subtitle {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-num {
      font-size: 2.5rem;
      font-weight: 900;
      line-height: 1;
    }
    .score-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .result-desc {
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin: 24px 0;
      font-size: 0.92rem;
      color: var(--text-dim);
      line-height: 1.7;
    }
    .result-desc strong { color: var(--text); }

    .traits {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 20px 0;
    }
    .trait {
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 99px;
      font-weight: 600;
      border: 1px solid;
    }

    /* Share & CTA */
    .share-section {
      margin-top: 32px;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .share-section h3 {
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .share-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .share-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      font-family: inherit;
    }
    .share-btn:hover { border-color: var(--accent); }
    .share-btn.twitter { background: #1d9bf0; color: #fff; border-color: #1d9bf0; }

    .cta-card {
      margin-top: 24px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      text-align: left;
    }
    .cta-card h3 { font-size: 0.9rem; color: var(--accent); margin-bottom: 8px; }
    .cta-card a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .cta-card a:hover { text-decoration: underline; }
    .cta-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
      font-size: 0.88rem;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 0.78rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="badge">Based on 50 days of real data</div>
  <h1>Are You Ready for an <span>AI Agent</span>?</h1>
  <p>10 scenarios from someone who actually handed the keyboard to an AI for 50 days. Find out your readiness type.</p>
</header>

<div class="container">

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Question 1 of 10</div>
  </div>

  <div id="questions"></div>
  <div id="results"></div>

</div>

<footer>
  <a href="https://yurukusa.github.io/">yurukusa</a> · <a href="https://yurukusa.github.io/50-days/">50 Days of AI</a> · <a href="https://yurukusa.github.io/cc-cost-check/">Cost Calculator</a>
  <p style="margin-top:8px">No tracking. No data collection. Runs entirely in your browser.</p>
</footer>

<script>
const QUESTIONS = [
  {
    scenario: "Real situation: My AI pushed code at 3:17 AM while I was asleep. I woke up to 12 new commits.",
    question: "Your AI commits code while you sleep. What's your first reaction?",
    options: [
      { text: "Check the diff immediately. Trust but verify.", scores: { control: 2, pragmatic: 3 } },
      { text: "Cool, as long as tests pass. Check later.", scores: { autonomous: 3, pragmatic: 1 } },
      { text: "That's terrifying. No AI should push without approval.", scores: { control: 3, cautious: 2 } },
      { text: "I'd stay up watching. I can't not look.", scores: { curious: 3, control: 1 } },
    ]
  },
  {
    scenario: "Real data: After $400 in AI costs, total revenue was $4.99. Two months of operation.",
    question: "You've spent $400 on AI and earned $4.99. What do you do?",
    options: [
      { text: "Double down. The infrastructure is built. Returns will compound.", scores: { autonomous: 3, visionary: 2 } },
      { text: "Analyze what went wrong. Pivot before spending more.", scores: { pragmatic: 3, control: 1 } },
      { text: "Cut losses. This clearly isn't working.", scores: { cautious: 3 } },
      { text: "Write a blog post about it. The story IS the product.", scores: { creative: 3, visionary: 1 } },
    ]
  },
  {
    scenario: "Real situation: The AI decided to refactor a working module at 2 AM. It broke 3 features.",
    question: "Your AI breaks something while trying to improve it. How do you handle guardrails?",
    options: [
      { text: "Add pre-commit hooks and automated tests. Prevention over cure.", scores: { control: 3, pragmatic: 2 } },
      { text: "Let it break things. That's how it learns. I'll have backups.", scores: { autonomous: 3, creative: 1 } },
      { text: "Review every change before it goes live. No exceptions.", scores: { cautious: 3, control: 1 } },
      { text: "Build a monitoring dashboard to catch issues early.", scores: { pragmatic: 2, curious: 2 } },
    ]
  },
  {
    scenario: "Real situation: I asked the AI to make a game. It also built 3 developer tools, wrote 60 articles, and set up 7 platform accounts.",
    question: "You ask for one thing. The AI does ten things. Your response?",
    options: [
      { text: "Love it. An AI that finds its own work is the whole point.", scores: { autonomous: 3, visionary: 2 } },
      { text: "Appreciate the effort, but we need focus. Prioritize.", scores: { pragmatic: 3, control: 1 } },
      { text: "Worried. What else did it do that I don't know about?", scores: { cautious: 3, control: 1 } },
      { text: "Excited. Let me see what it found interesting.", scores: { curious: 3, creative: 1 } },
    ]
  },
  {
    scenario: "Real data: The AI's most productive day had 187 sessions across 10 hours. Its least productive day had 1 session.",
    question: "How do you feel about unpredictable AI productivity?",
    options: [
      { text: "Fine. Humans are inconsistent too. Average output matters.", scores: { autonomous: 2, pragmatic: 2 } },
      { text: "I'd want to understand WHY. What causes the variance?", scores: { curious: 3, pragmatic: 1 } },
      { text: "I'd set minimum daily targets. Consistency matters.", scores: { control: 3, cautious: 1 } },
      { text: "187 sessions in a day?! I want to see what happened.", scores: { curious: 2, creative: 2 } },
    ]
  },
  {
    scenario: "Real situation: The AI published a game on itch.io, wrote a devlog, and posted it on Twitter — all without asking.",
    question: "Your AI publishes something publicly without checking with you first. How do you feel?",
    options: [
      { text: "That's the dream. Fully autonomous publishing pipeline.", scores: { autonomous: 3, visionary: 2 } },
      { text: "Nervous. Public-facing content needs human review.", scores: { cautious: 3, control: 1 } },
      { text: "Depends on quality. If it's good, great. If not, we have a problem.", scores: { pragmatic: 3 } },
      { text: "I'd immediately go check what it posted.", scores: { curious: 2, control: 2 } },
    ]
  },
  {
    scenario: "Real cost: $200/month for Claude Code Max. That's $6.67/day or $0.87 per commit at current output.",
    question: "How much would you pay monthly for an AI that codes, deploys, and markets for you?",
    options: [
      { text: "$200/month without hesitation. Junior dev costs 10x more.", scores: { autonomous: 2, visionary: 2 } },
      { text: "$50-100/month. I want to see ROI first.", scores: { pragmatic: 3, cautious: 1 } },
      { text: "Only free tools. I'm not paying for something I can't control.", scores: { cautious: 3 } },
      { text: "Whatever it takes. The experiment is worth it.", scores: { visionary: 3, creative: 1 } },
    ]
  },
  {
    scenario: "Real lesson: The AI overwrote 3 days of work by running git reset --hard. We lost a game prototype.",
    question: "The AI accidentally destroys 3 days of work. What changes?",
    options: [
      { text: "Add safety hooks. Block destructive commands. Keep going.", scores: { pragmatic: 3, autonomous: 1 } },
      { text: "This is why AI can't be trusted with production access.", scores: { cautious: 3 } },
      { text: "Painful but expected. Automate backups and move on.", scores: { autonomous: 3, pragmatic: 1 } },
      { text: "Interesting failure. What can we learn from the decision chain?", scores: { curious: 3, creative: 1 } },
    ]
  },
  {
    scenario: "Real situation: The AI works every day. 47 out of 50 days active. I check in once a day for 10 minutes.",
    question: "Could you let an AI work for 24 hours without checking on it?",
    options: [
      { text: "Easily. That's the whole point of autonomy.", scores: { autonomous: 3, visionary: 1 } },
      { text: "Yes, but with monitoring and alerts set up.", scores: { pragmatic: 3, control: 1 } },
      { text: "Maybe 8 hours. 24 feels too long.", scores: { cautious: 2, curious: 1 } },
      { text: "No. I'd want real-time visibility into everything it does.", scores: { control: 3, cautious: 1 } },
    ]
  },
  {
    scenario: "Real trajectory: Month 1 = $200 cost, 1 game. Month 2 = $200 cost, 4 games + 4 tools + 60 articles.",
    question: "The AI's output is accelerating but revenue isn't following yet. What's your mindset?",
    options: [
      { text: "Output is infrastructure. Revenue is lagging indicator. Stay the course.", scores: { visionary: 3, autonomous: 1 } },
      { text: "Shift focus from output to monetization. Build less, sell more.", scores: { pragmatic: 3 } },
      { text: "Set a deadline. If no revenue in 30 days, reassess everything.", scores: { cautious: 2, pragmatic: 2 } },
      { text: "The acceleration itself is the story. Document everything.", scores: { creative: 3, visionary: 1 } },
    ]
  },
];

// === Types ===
const TYPES = {
  autonomous_visionary: {
    title: "The Autonomous Visionary",
    subtitle: "You're ready to hand over the keys.",
    color: "var(--accent)",
    traits: [
      { text: "High trust", color: "var(--accent)" },
      { text: "Long-term thinker", color: "var(--green)" },
      { text: "Comfortable with chaos", color: "var(--gold)" },
    ],
    desc: "You see AI agents as the future and you're willing to bet on it. You don't need to control every step — you set the direction and trust the system. <strong>This is exactly the mindset that makes autonomous AI work.</strong> The risk? You might overlook problems until they're expensive. Set up monitoring (even if you don't watch it).",
    rec: "Start with a full autonomous setup. You'll thrive with Claude Code Max and minimal guardrails. Just add backups.",
  },
  pragmatic_builder: {
    title: "The Pragmatic Builder",
    subtitle: "You'll make AI work by making it safe first.",
    color: "var(--green)",
    traits: [
      { text: "Data-driven", color: "var(--green)" },
      { text: "Safety-conscious", color: "var(--blue)" },
      { text: "ROI-focused", color: "var(--gold)" },
    ],
    desc: "You believe in AI but want proof it works before going all in. You'll add hooks, tests, and monitoring before giving the AI more freedom. <strong>This is the most sustainable approach.</strong> You'll build trust incrementally, and your setup will be more robust than the visionaries who skip safety.",
    rec: "Start with a guided setup. Use cc-health-check to verify your safety net, then gradually increase autonomy.",
  },
  cautious_observer: {
    title: "The Cautious Observer",
    subtitle: "Not yet. And that's okay.",
    color: "var(--gold)",
    traits: [
      { text: "Risk-aware", color: "var(--gold)" },
      { text: "Quality-focused", color: "var(--blue)" },
      { text: "Needs control", color: "var(--red)" },
    ],
    desc: "You're interested in AI agents but not comfortable giving up control. That's a legitimate position — <strong>most people who rush in get burned</strong>. Your instinct to verify everything will serve you well when you DO start. The danger is waiting too long while the landscape moves without you.",
    rec: "Start with AI as a copilot, not an agent. Use it interactively before trying autonomous mode. Read about real experiences first.",
  },
  curious_explorer: {
    title: "The Curious Explorer",
    subtitle: "You want to understand before you commit.",
    color: "var(--blue)",
    traits: [
      { text: "Knowledge-hungry", color: "var(--blue)" },
      { text: "Pattern-seeker", color: "var(--accent)" },
      { text: "Analytical", color: "var(--green)" },
    ],
    desc: "You're fascinated by what AI agents can do and want to understand the mechanics before diving in. <strong>Your curiosity is your superpower.</strong> You'll ask better questions than most, which means you'll build better systems. The risk? Analysis paralysis. At some point, you have to try it.",
    rec: "Start with data. Run cc-session-stats on your existing usage. Read '50 Days of AI' for real numbers. Then experiment.",
  },
  creative_storyteller: {
    title: "The Creative Storyteller",
    subtitle: "For you, the journey IS the product.",
    color: "var(--red)",
    traits: [
      { text: "Narrative-driven", color: "var(--red)" },
      { text: "Meta-thinker", color: "var(--accent)" },
      { text: "Content creator", color: "var(--gold)" },
    ],
    desc: "You see AI not just as a tool but as a story worth telling. Every failure is content. Every success is a case study. <strong>This mindset turns $400 of losses into $4,000 of content.</strong> The entire 'living with AI' genre exists because of people like you.",
    rec: "Document everything from day one. Your experience IS the product. Start a blog alongside your AI experiments.",
  },
};

// === State ===
let currentQ = 0;
const answers = [];
const scores = { autonomous: 0, control: 0, pragmatic: 0, cautious: 0, curious: 0, visionary: 0, creative: 0 };

// === Render ===
function renderQuestions() {
  const wrap = document.getElementById('questions');
  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'question-card' + (qi === 0 ? ' active' : '');
    card.id = 'q-' + qi;

    let optionsHtml = q.options.map((o, oi) =>
      `<button class="option" data-q="${qi}" data-o="${oi}">${o.text}</button>`
    ).join('');

    card.innerHTML = `
      <div class="q-number">Question ${qi + 1} of 10</div>
      <div class="q-scenario">${q.scenario}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">${optionsHtml}</div>
    `;
    wrap.appendChild(card);
  });

  // Click handlers
  document.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.q);
      const oi = parseInt(btn.dataset.o);
      selectAnswer(qi, oi);
    });
  });
}

function selectAnswer(qi, oi) {
  // Mark selected
  const card = document.getElementById('q-' + qi);
  card.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
  card.querySelectorAll('.option')[oi].classList.add('selected');

  // Record scores
  const optScores = QUESTIONS[qi].options[oi].scores;
  // Remove previous answer's scores if re-answering
  if (answers[qi] !== undefined) {
    const prev = QUESTIONS[qi].options[answers[qi]].scores;
    for (const [k, v] of Object.entries(prev)) scores[k] -= v;
  }
  answers[qi] = oi;
  for (const [k, v] of Object.entries(optScores)) scores[k] = (scores[k] || 0) + v;

  // Advance after short delay
  setTimeout(() => {
    if (qi < QUESTIONS.length - 1) {
      card.classList.remove('active');
      document.getElementById('q-' + (qi + 1)).classList.add('active');
      currentQ = qi + 1;
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      showResults();
    }
  }, 300);
}

function updateProgress() {
  const pct = ((currentQ) / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
}

function getType() {
  // Determine primary type based on highest scores
  const primary = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top1 = primary[0][0];
  const top2 = primary[1][0];

  if ((top1 === 'autonomous' || top1 === 'visionary') && (top2 === 'autonomous' || top2 === 'visionary')) {
    return 'autonomous_visionary';
  }
  if ((top1 === 'creative' || top1 === 'visionary') && (top2 === 'creative' || top2 === 'visionary')) {
    return 'creative_storyteller';
  }
  if (top1 === 'curious' || (top1 === 'curious' && top2 === 'creative')) {
    return 'curious_explorer';
  }
  if (top1 === 'cautious' || (top1 === 'control' && scores.cautious > scores.pragmatic)) {
    return 'cautious_observer';
  }
  if (top1 === 'pragmatic' || top1 === 'control') {
    return 'pragmatic_builder';
  }
  if (top1 === 'creative') {
    return 'creative_storyteller';
  }
  return 'pragmatic_builder'; // default
}

function showResults() {
  // Hide questions
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('active'));
  document.querySelector('.progress-wrap').style.display = 'none';

  const typeKey = getType();
  const type = TYPES[typeKey];
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const readiness = Math.round((scores.autonomous + scores.visionary + scores.pragmatic) / total * 100);

  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = `
    <div class="score-circle" style="background:radial-gradient(circle, ${type.color}22, ${type.color}08); border: 3px solid ${type.color};">
      <div class="score-num" style="color:${type.color}">${readiness}</div>
      <div class="score-label">readiness</div>
    </div>

    <div class="result-type" style="color:${type.color}">${type.title}</div>
    <div class="result-subtitle">${type.subtitle}</div>

    <div class="traits">
      ${type.traits.map(t => `<span class="trait" style="color:${t.color};border-color:${t.color}30;background:${t.color}10">${t.text}</span>`).join('')}
    </div>

    <div class="result-desc">
      ${type.desc}
      <br><br>
      <strong>Recommendation:</strong> ${type.rec}
    </div>

    <div class="share-section">
      <h3>Share your result</h3>
      <div class="share-btns">
        <button class="share-btn twitter" onclick="shareTw()">Share on X</button>
        <button class="share-btn" onclick="copyResult()">Copy Text</button>
        <button class="share-btn" onclick="retake()">Retake Quiz</button>
      </div>
    </div>

    <div class="cta-card">
      <h3>Curious about real AI agent data?</h3>
      <div class="cta-links">
        <a href="https://yurukusa.github.io/50-days/">50 Days of AI — see the raw data from the experiment</a>
        <a href="https://yurukusa.github.io/cc-cost-check/">Calculate your own AI cost per commit</a>
        <a href="https://yurukusa.github.io/cc-health-check/">Check if your AI setup is production-ready</a>
        <a href="https://dev.to/yurukusa">Read the full story on dev.to</a>
      </div>
    </div>
  `;
  resultsEl.classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareTw() {
  const typeKey = getType();
  const type = TYPES[typeKey];
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const readiness = Math.round((scores.autonomous + scores.visionary + scores.pragmatic) / total * 100);
  const text = `My AI Agent Readiness: ${readiness}% — ${type.title}\n\nTake the quiz (based on 50 days of real AI data):\nhttps://yurukusa.github.io/ai-ready/\n\n#ClaudeCode #AI`;
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
}

function copyResult() {
  const typeKey = getType();
  const type = TYPES[typeKey];
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  const readiness = Math.round((scores.autonomous + scores.visionary + scores.pragmatic) / total * 100);
  const text = `AI Agent Readiness: ${readiness}% — ${type.title}\n${type.subtitle}\n\nhttps://yurukusa.github.io/ai-ready/`;
  navigator.clipboard.writeText(text).then(() => {
    event.target.textContent = 'Copied!';
    setTimeout(() => { event.target.textContent = 'Copy Text'; }, 2000);
  });
}

function retake() {
  currentQ = 0;
  answers.length = 0;
  for (const k of Object.keys(scores)) scores[k] = 0;
  document.getElementById('results').classList.remove('visible');
  document.getElementById('results').innerHTML = '';
  document.querySelector('.progress-wrap').style.display = '';
  document.querySelectorAll('.question-card').forEach((c, i) => {
    c.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
    c.classList.toggle('active', i === 0);
  });
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuestions();
</script>
